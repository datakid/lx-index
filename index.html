<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>LX Index</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Lora:ital,wght@0,400;0,600;1,400&family=Tajawal:wght@400;500;700&family=Readex+Pro:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="icon" type="image/x-icon" href="favicon.ico">
<style>
:root {
--ui-bg: #f8fafc;
--ui-surface: #ffffff;
--ui-border: #e2e8f0;
--ui-border-hover: #cbd5e1;
--ui-text-main: #0f172a;
--ui-text-dim: #64748b;
--primary: #2563eb;
--primary-hover: #1d4ed8;
--primary-alpha: rgba(37,99,235,0.1);
--danger: #ef4444;
--danger-hover: #dc2626;
--success: #10b981;
--shadow-sm: 0 1px 2px 0 rgba(0,0,0,0.05);
--shadow-md: 0 4px 6px -1px rgba(0,0,0,0.1), 0 2px 4px -1px rgba(0,0,0,0.06);
--shadow-lg: 0 10px 15px -3px rgba(0,0,0,0.1), 0 4px 6px -2px rgba(0,0,0,0.05);
--sb-w: 340px;
--doc-font: 'Inter', system-ui, sans-serif;
--doc-size: 13px;
--doc-weight: 400;
--doc-odd: #f8fafc;
--doc-even: #ffffff;
--doc-text: #0f172a;
--doc-rad: 8px;
--doc-bw: 2px;
--doc-bs: solid;
--doc-bc: #94a3b8;
--doc-hw: 1px;
--doc-vw: 0px;
--doc-ic: #e2e8f0;
--doc-dw: 2px;
--doc-ds: solid;
--doc-dc: #94a3b8;
--doc-pad: 8mm;
}
html.dark {
--ui-bg: #0f172a;
--ui-surface: #1e293b;
--ui-border: #334155;
--ui-border-hover: #475569;
--ui-text-main: #f8fafc;
--ui-text-dim: #94a3b8;
--primary: #3b82f6;
--primary-hover: #60a5fa;
--primary-alpha: rgba(59,130,246,0.15);
--shadow-sm: 0 1px 2px 0 rgba(0,0,0,0.5);
--shadow-md: 0 4px 6px -1px rgba(0,0,0,0.4);
--shadow-lg: 0 10px 15px -3px rgba(0,0,0,0.5);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;display:flex;height:100dvh;background:var(--ui-bg);color:var(--ui-text-main);overflow:hidden;transition:background 0.3s,color 0.3s}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--ui-border-hover);border-radius:10px}
::-webkit-scrollbar-thumb:hover{background:var(--ui-text-dim)}
#sidebar{width:var(--sb-w);flex-shrink:0;background:var(--ui-surface);display:flex;flex-direction:column;border-right:1px solid var(--ui-border);z-index:40;transition:transform 0.3s,width 0.3s}
.sb-head{padding:16px 20px;border-bottom:1px solid var(--ui-border);display:flex;align-items:center;justify-content:space-between;gap:12px;background:var(--ui-surface)}
.brand{display:flex;align-items:center;gap:12px}
.logo{width:32px;height:32px;background:var(--primary);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;color:#fff;letter-spacing:-1px}
.brand-text{display:flex;flex-direction:column;line-height:1.2}
.brand-name{font-size:16px;font-weight:600}
.brand-sub{font-size:11px;color:var(--ui-text-dim)}
.head-actions{display:flex;align-items:center;gap:8px}
.icon-btn{width:32px;height:32px;border-radius:6px;border:1px solid var(--ui-border);background:transparent;color:var(--ui-text-dim);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all 0.2s}
.icon-btn:hover{background:var(--ui-bg);color:var(--ui-text-main);border-color:var(--ui-border-hover)}
.status-dot{width:8px;height:8px;border-radius:50%;background:var(--success);transition:all 0.3s}
.stats-bar{display:flex;border-bottom:1px solid var(--ui-border);background:var(--ui-surface)}
.stat-box{flex:1;padding:12px 0;text-align:center;position:relative}
.stat-box+.stat-box::before{content:'';position:absolute;left:0;top:20%;height:60%;width:1px;background:var(--ui-border)}
.stat-v{font-size:18px;font-weight:600;line-height:1}
.stat-v.acc{color:var(--primary)}
.stat-l{font-size:10px;color:var(--ui-text-dim);font-weight:500;margin-top:4px;text-transform:uppercase;letter-spacing:0.5px}
.search-bar{padding:16px 20px;border-bottom:1px solid var(--ui-border);background:var(--ui-surface)}
.search-wrap{display:flex;align-items:center;gap:8px;background:var(--ui-bg);border:1px solid var(--ui-border);border-radius:6px;padding:8px 12px;transition:all 0.2s}
.search-wrap:focus-within{border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-alpha)}
.search-wrap input{background:none;border:none;outline:none;color:var(--ui-text-main);font-size:13px;font-family:inherit;width:100%}
.search-wrap input::placeholder{color:var(--ui-text-dim)}
.s-hint{font-size:10px;color:var(--ui-text-dim);background:var(--ui-border);padding:2px 6px;border-radius:4px;user-select:none}
.s-clear{background:none;border:none;cursor:pointer;color:var(--ui-text-dim);font-size:14px;display:none}
.s-clear.vis{display:block}
.sb-scroll{flex:1;overflow-y:auto;padding:16px 20px;display:flex;flex-direction:column;gap:12px}
details.panel{border:1px solid var(--ui-border);border-radius:8px;background:var(--ui-surface);box-shadow:var(--shadow-sm);transition:border-color 0.2s}
details.panel[open]{border-color:var(--ui-border-hover)}
details.panel.active-cell{border-color:var(--primary);box-shadow:0 0 0 1px var(--primary)}
summary.panel-head{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;cursor:pointer;user-select:none;list-style:none}
summary.panel-head::-webkit-details-marker{display:none}
.ph-left{display:flex;align-items:center;gap:12px}
.ph-icon{width:24px;height:24px;background:var(--ui-bg);border-radius:6px;font-size:12px;font-weight:600;color:var(--ui-text-dim);display:flex;align-items:center;justify-content:center}
details.panel.active-cell .ph-icon{background:var(--primary);color:#fff}
.ph-title{font-size:13px;font-weight:600}
.ph-chevron{font-size:12px;color:var(--ui-text-dim);transition:transform 0.2s}
details.panel[open] summary .ph-chevron{transform:rotate(180deg)}
.panel-body{padding:0 16px 16px;display:flex;flex-direction:column;gap:12px}
.ctrl-row{display:flex;align-items:center;justify-content:space-between;gap:8px}
.ctrl-row.col{flex-direction:column;align-items:stretch}
.ctrl-lbl{font-size:12px;font-weight:500;color:var(--ui-text-dim);white-space:nowrap}
.divider{height:1px;background:var(--ui-border);margin:4px 0}
.btn{border:none;border-radius:6px;font-size:12px;font-weight:500;cursor:pointer;transition:all 0.2s;display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:8px 12px;font-family:inherit;-webkit-tap-highlight-color:transparent}
.btn.fw{width:100%}
.btn-p{background:var(--primary);color:#fff;box-shadow:var(--shadow-sm)}
.btn-p:hover{background:var(--primary-hover);box-shadow:var(--shadow-md)}
.btn-s{background:var(--ui-bg);color:var(--ui-text-main);border:1px solid var(--ui-border)}
.btn-s:hover{background:var(--ui-border);border-color:var(--ui-border-hover)}
.btn-d{background:rgba(239,68,68,0.1);color:var(--danger);border:1px solid rgba(239,68,68,0.2)}
.btn-d:hover{background:rgba(239,68,68,0.2)}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.tbr-btn{width:32px;height:32px;border-radius:6px;background:var(--ui-bg);border:1px solid var(--ui-border);color:var(--ui-text-dim);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;transition:all 0.2s}
.tbr-btn:hover{background:var(--ui-border);color:var(--ui-text-main)}
.tbr-btn.on{background:var(--primary-alpha);border-color:var(--primary);color:var(--primary)}
.file-wrap{position:relative;display:block}
.file-wrap input{position:absolute;inset:0;opacity:0;cursor:pointer}
.inp-sel{background:var(--ui-bg);border:1px solid var(--ui-border);border-radius:6px;color:var(--ui-text-main);padding:6px 10px;font-size:12px;font-family:inherit;outline:none;cursor:pointer;width:100%}
.inp-sel:focus{border-color:var(--primary);box-shadow:0 0 0 2px var(--primary-alpha)}
.inp-num{background:var(--ui-bg);border:1px solid var(--ui-border);color:var(--ui-text-main);border-radius:6px;padding:6px;text-align:center;font-size:12px;font-family:'JetBrains Mono',monospace;outline:none;width:50px}
.inp-num:focus{border-color:var(--primary)}
.range-wrap{display:flex;align-items:center;gap:8px;flex:1}
.range-wrap input{flex:1;accent-color:var(--primary);cursor:pointer}
.range-lbl{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--ui-text-dim);width:28px;text-align:right;flex-shrink:0}
.col-wrap{display:flex;align-items:center;gap:6px;background:var(--ui-bg);border:1px solid var(--ui-border);border-radius:6px;padding:4px 8px;transition:all 0.2s}
.col-wrap:focus-within{border-color:var(--primary);box-shadow:0 0 0 2px var(--primary-alpha)}
.col-hash{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--ui-text-dim)}
.col-wrap input[type=text]{background:none;border:none;outline:none;font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--ui-text-main);text-transform:uppercase;width:100%}
.col-wrap input[type=color]{width:20px;height:20px;border-radius:4px;border:1px solid var(--ui-border);cursor:pointer;padding:0;background:none}
.col-wrap input[type=color]::-webkit-color-swatch-wrapper{padding:0}
.col-wrap input[type=color]::-webkit-color-swatch{border-radius:3px;border:none}
.theme-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.theme-card{border:1px solid var(--ui-border);border-radius:6px;padding:10px;cursor:pointer;transition:all 0.2s;background:var(--ui-bg);position:relative;text-align:center}
.theme-card:hover{border-color:var(--primary)}
.theme-card.on{border-color:var(--primary);background:var(--primary-alpha);box-shadow:0 0 0 1px var(--primary)}
.theme-card.on .tc-n{color:var(--primary)}
.tc-n{font-size:12px;font-weight:600;color:var(--ui-text-main);margin-bottom:2px}
.tc-d{font-size:10px;color:var(--ui-text-dim)}
.badge{padding:3px 8px;border-radius:12px;font-size:10px;font-weight:600;text-transform:uppercase}
.b-pass{background:rgba(16,185,129,0.15);color:var(--success)}
.b-fail{background:rgba(239,68,68,0.15);color:var(--danger)}
#workspace{flex:1;overflow-y:auto;display:flex;justify-content:center;align-items:flex-start;padding:32px 24px;background:var(--ui-bg);position:relative}
.doc-wrap{width:210mm;min-height:297mm;height:297mm;background:#ffffff;box-shadow:var(--shadow-lg);padding:var(--doc-pad);flex-shrink:0;position:relative;border-radius:4px}
.doc-cont{width:100%;height:100%;border-width:var(--doc-bw);border-style:var(--doc-bs);border-color:var(--doc-bc);border-radius:var(--doc-rad);overflow:hidden}
table.lxi{width:100%;height:100%;border-collapse:separate;border-spacing:0;table-layout:fixed;background:var(--doc-even)}
table.lxi tr{height:calc(100%/50)}
table.lxi tr:nth-child(odd){background-color:var(--doc-odd)}
table.lxi td{padding:0 5px;font-family:var(--doc-font);font-size:var(--doc-size);font-weight:var(--doc-weight);color:var(--doc-text);border-bottom-width:var(--doc-hw);border-bottom-style:var(--doc-bs);border-bottom-color:var(--doc-ic);border-right-width:var(--doc-vw);border-right-style:var(--doc-bs);border-right-color:var(--doc-ic);white-space:nowrap;overflow:hidden;line-height:1.2;vertical-align:middle}
table.lxi tr:last-child td{border-bottom:none}
table.lxi td:last-child{border-right:none !important}
table.lxi td:nth-child(odd){width:24px;text-align:right;padding-right:4px;padding-left:0;font-weight:500;opacity:0.4;user-select:none;font-size:11px;font-family:'JetBrains Mono',monospace}
table.lxi td:nth-child(even){outline:none;cursor:text;transition:background 0.1s}
table.lxi td:nth-child(even):focus{background:rgba(37,99,235,0.08) !important;box-shadow:inset 0 0 0 2px var(--primary);border-radius:2px}
table.lxi td:nth-child(even):hover:not(:focus){background:rgba(0,0,0,0.03)}
table.lxi td:nth-child(2),table.lxi td:nth-child(4),table.lxi td:nth-child(6){border-right-width:var(--doc-dw);border-right-style:var(--doc-ds);border-right-color:var(--doc-dc)}
table.lxi td.smatch{background:rgba(234,179,8,0.2) !important;box-shadow:inset 0 0 0 2px #eab308;border-radius:2px}
.dup-warn{background-image:linear-gradient(135deg,transparent 85%,rgba(239,68,68,0.2) 85%,rgba(239,68,68,0.5) 100%) !important}
#toast{position:fixed;bottom:24px;right:24px;z-index:100;background:var(--ui-surface);color:var(--ui-text-main);border:1px solid var(--ui-border);padding:12px 20px;border-radius:6px;font-size:13px;font-weight:500;box-shadow:var(--shadow-lg);opacity:0;transform:translateY(16px);transition:all 0.3s;pointer-events:none;display:flex;align-items:center;gap:10px}
#toast.show{opacity:1;transform:translateY(0)}
.mobile-tog{display:none;position:fixed;bottom:20px;right:20px;z-index:90;width:50px;height:50px;border-radius:25px;background:var(--primary);color:#fff;border:none;box-shadow:var(--shadow-lg);font-size:24px;align-items:center;justify-content:center}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:30;opacity:0;transition:opacity 0.3s}
@media print {
@page{size:A4 portrait;margin:0}
body{background:white !important;width:210mm;height:297mm;display:block;overflow:hidden;margin:0;padding:0}
#sidebar,.mobile-tog,.overlay,#toast{display:none !important}
#workspace{padding:0 !important;background:none !important;display:block}
.doc-wrap{box-shadow:none !important;margin:0 !important;width:210mm;height:297mm;border-radius:0 !important;background:white !important}
}
@media(max-width:768px){
#sidebar{position:fixed;top:0;bottom:0;left:0;transform:translateX(-100%)}
#sidebar.open{transform:translateX(0)}
.mobile-tog{display:flex}
.overlay.vis{display:block;opacity:1}
#workspace{padding:16px 12px 80px}
.doc-wrap{width:100%;height:auto;min-height:auto}
table.lxi{height:auto}
table.lxi tr{height:auto}
table.lxi td{padding:4px}
}
</style>
</head>

function aDSty(td,id){const s=appStyles[id];if(!s){td.style.removeProperty('font-weight');td.style.removeProperty('font-style');td.style.removeProperty('text-decoration');td.style.removeProperty('color');td.dataset.cz='';return}if(s.b)td.style.setProperty('font-weight','700','important');else td.style.removeProperty('font-weight');if(s.i)td.style.setProperty('font-style','italic','important');else td.style.removeProperty('font-style');if(s.u)td.style.setProperty('text-decoration','underline','important');else td.style.removeProperty('text-decoration');if(s.c)td.style.setProperty('color',s.c,'important');else td.style.removeProperty('color');td.dataset.cz=s.s||''}
